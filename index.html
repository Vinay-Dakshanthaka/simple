<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Be Happy No BP</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 520px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        .view {
            display: none;
        }

        .viewButtons {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            background: white;
            color: #ff6f91;
        }

        button:hover {
            background: #ff6f91;
            color: white;
        }

        #quote {
            color: white;
            font-size: 18px;
            margin: 20px;
            min-height: 60px;
        }

    #happyImage {
    width: 100%;
    height: 250px;
    object-fit: contain;
    border-radius: 10px;
    margin-bottom: 20px;
    background: white;
}

        .wheelBox {
            position: relative;
            width: 320px;
            margin: auto;
        }

        #wheel {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 5px 10px rgba(255, 255, 255, 0.5),
                inset 0 -5px 10px rgba(0, 0, 0, 0.3);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);

            width: 0;
            height: 0;

            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid white;
        }

        .heart {
            position: absolute;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh)
            }

            to {
                transform: translateY(-10vh)
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>✨ HI ANDI ✨</h1>

        <div class="viewButtons">
            <button onclick="showView('quotes')">Quotes 😊</button>
            <button onclick="showView('images')">Images 📸</button>
            <button onclick="showView('wheel')">Spin Wheel 🎡</button>
        </div>

        <!-- QUOTES -->
        <div id="quotesView" class="view">

            <div id="quote">Edho oka button click cheyandi</div>

            <button onclick="newQuote()">New Quote</button>

        </div>


        <!-- IMAGES -->
        <div id="imagesView" class="view">

            <img id="happyImage" src="images/smily_face.png">

            <button onclick="changeImage()">Next Image</button>

        </div>


        <!-- WHEEL -->
        <div id="wheelView" class="view">

            <div class="wheelBox">

                <div class="pointer"></div>

                <svg id="wheel"></svg>

            </div>

            <button onclick="spinWheel()">SPIN</button>

        </div>

    </div>


    <script>

        /* ---------------- QUOTES ---------------- */

        const quotes = [
            "Entandi GOOGLE GOODNESS ante mee pere vasthundhi em chesaru",
            "Happy ga vundandi endhuku dull ga vunnaru",
            "Okasari pallu choopinchandi 😁",
            "Hi andi surprise baagunnara",
            "Enti what's your problem",
            "Chaduvukondi firstuuu",
            "Na 20 Crores yeppudu istharu",
            "Water thagaandi health is wealth"
        ]

        let lastQuote = -1

        function newQuote() {

            const quote = document.getElementById("quote")
            const img = document.getElementById("happyImage")

            img.style.display = "none"
            quote.style.display = "block"

            let index

            do {
                index = Math.floor(Math.random() * quotes.length)
            }
            while (index === lastQuote)

            lastQuote = index

            quote.innerText = quotes[index]

            createHearts()

        }

        /* ---------------- IMAGES ---------------- */
const images = [
    "images/I_belive_in_you.jpeg",
    "images/Iwillhandle.jpeg",
    "images/andhame_asuya.jpeg",
    "images/cat.jpeg",
    "images/anti_delulu.jpeg",
    "images/any_problem_dont_call.jpeg",
    "images/aur_batao_friend.jpeg",
    "images/baba_and_baby_girl.jpeg",
    "images/bp_baby.jpeg",
    "images/cat_smile.jpeg",
    "images/come_here.jpeg",
    "images/doing_better.jpeg",
    "images/dont_be_the_problem.jpeg",
    "images/drink_water.jpeg",
    "images/ive_thagginchukunte_manchidhi.jpeg",
    "images/jerry.jpeg",
    "images/masala_dosa_meme.jpeg",
    "images/mood_of_the_day_relax.jpeg",
    "images/neeku_vunna_brain.jpeg",
    "images/night_1.jpeg",
    "images/red_velvet.jpeg",
    "images/relaxxx.jpeg",
    "images/shiva_and_baby_girl.jpeg",
    "images/shiva_and_baby_girl_2.jpeg",
    "images/tiger.jpeg",
    "images/weird_brain.jpeg",
    "images/ye_le_5_rupees.jpeg",
];

        let lastImage = -1
function changeImage() {

    const img = document.getElementById("happyImage")

    let index

    do {
        index = Math.floor(Math.random() * images.length)
    }
    while (index === lastImage)

    lastImage = index

    img.src = images[index]

}

        /* ---------------- VIEW SWITCH ---------------- */

        function showView(view) {

            document.querySelectorAll(".view")
                .forEach(v => v.style.display = "none")

            if (view === "quotes") document.getElementById("quotesView").style.display = "block"
            if (view === "images") {
    document.getElementById("imagesView").style.display = "block"
    document.getElementById("happyImage").style.display = "block"
}
            if (view === "wheel") document.getElementById("wheelView").style.display = "block"

        }

        showView("quotes")


        /* ---------------- HEARTS ---------------- */

        function createHearts() {

            for (let i = 0; i < 10; i++) {

                let heart = document.createElement("div")

                heart.classList.add("heart")

                heart.innerHTML = "😁"

                heart.style.left = Math.random() * 100 + "vw"
                heart.style.fontSize = Math.random() * 20 + 20 + "px"

                document.body.appendChild(heart)

                setTimeout(() => heart.remove(), 6000)

            }

        }


        /* ---------------- SPIN WHEEL ---------------- */

        const wheelOptions = [
            "Smile 😁",
            "Drink Water 💧",
            "Relax 🧘",
            "Call Friend 📞",
            "Take Break ☕",
            "Eat Something 🍎"
        ]

        const width = 320
        const radius = width / 2

        const svg = d3.select("#wheel")
            .attr("width", width)
            .attr("height", width)

        const group = svg.append("g")
            .attr("transform", `translate(${radius},${radius})`)

        const pie = d3.pie().value(1)

        const arc = d3.arc()
            .innerRadius(0)
            .outerRadius(radius)

        const arcs = group.selectAll("arc")
            .data(pie(wheelOptions))
            .enter()
            .append("g")

        arcs.append("path")
            .attr("d", arc)
            .attr("fill", (d, i) =>
                ["#FF9AA2", "#FFB7B2", "#FFDAC1", "#E2F0CB", "#B5EAD7", "#C7CEEA"][i]
            )

        arcs.append("text")
            .attr("transform", d => `translate(${arc.centroid(d)})`)
            .attr("text-anchor", "middle")
            .style("font-size", "12px")
            .style("font-weight", "bold")
            .text((d, i) => wheelOptions[i])


        let rotation = 0
        let spinning = false

      function spinWheel() {

    if (spinning) return
    spinning = true

    const slices = wheelOptions.length
    const sliceAngle = 360 / slices

    // choose winner first
    const winnerIndex = Math.floor(Math.random() * slices)

    // center of winning slice
    const targetAngle = 360 - (winnerIndex * sliceAngle + sliceAngle / 2)

    // big fast spins
    const fastSpins = 360 * 10

    // total rotation needed
    const finalRotation = fastSpins + targetAngle

    rotation += finalRotation

    // PHASE 1 — fast spinning
    group.transition()
        .duration(3500)
        .ease(d3.easeLinear)
        .attrTween("transform", function () {

            const i = d3.interpolateNumber(rotation - finalRotation, rotation - 360)

            return function (t) {
                return `translate(${radius},${radius}) rotate(${i(t)})`
            }

        })

        // PHASE 2 — slow stop
        .transition()
        .duration(2000)
        .ease(d3.easeCubicOut)
        .attrTween("transform", function () {

            const i = d3.interpolateNumber(rotation - 360, rotation)

            return function (t) {
                return `translate(${radius},${radius}) rotate(${i(t)})`
            }

        })

        .on("end", () => {

            spinning = false

            document.getElementById("quote").innerText =
                wheelOptions[winnerIndex]

            confetti({
                particleCount: 120,
                spread: 90
            })

        })

}
  
  </script>

</body>

</html>
